jar.doFirst{
    manifest {
        attributes('Manifest-Version'       : '1.0',
//                'Created-By'             : vendor,
//                'Specification-Title'    : appName,
//                'Specification-Version'  : jmeVersion,
//                'Specification-Vendor'   : "jMonkeyEngine",
//                'Implementation-Title'   : appName,
//                'Implementation-Version' : version,
//                'Implementation-Vendor'  : vendor,
                'Main-Class'             : getProperty('mainClassName'),
                // Add dependencies to manifest, remove version
                'Class-Path'             : configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.collect {
                                                        'lib/' +
                                                        it.name +
                                                        (it.classifier != null ? '-' + it.classifier : '') +
                                                        '.' + it.extension }.join(' ')
        )
    }
}

task dist (dependsOn: ['build', ':jme3-android:jar']) {
    doLast {
        // Copy all dependencies to ../dist/lib, remove versions from jar files
        configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            copy {
                from artifact.file
                into '../dist/lib'
                if(artifact.classifier != null){
                    rename { "${artifact.name}-${artifact.classifier}.${artifact.extension}" }
                } else{
                    rename { "${artifact.name}.${artifact.extension}" }
                }
            }
        }
        copy {
            from tasks.named('jar').flatMap { it.archiveFile }
            into '../dist'
            rename { "jMonkeyEngine3.jar" }
        }

        // Copy android packages, remove version
        copy {
            from androidProject.tasks.named('jar').flatMap { it.archiveFile }
            into '../dist/opt/android'
            rename { androidProject.name + ".jar" }
        }
        def androidNativeDependency = libs.jme3.android.natives.get()
        def androidNativeArtifact = androidProject.configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.find {
            it.moduleVersion.id.group == androidNativeDependency.module.group && it.name == androidNativeDependency.module.name
        }
        if (androidNativeArtifact == null) {
            throw new GradleException("Unable to resolve ${androidNativeDependency.module} for the distribution")
        }
        copy {
            from androidNativeArtifact.file
            into '../dist/opt/android'
            rename { androidNativeArtifact.name + ".${androidNativeArtifact.extension}" }
        }
    }
}
