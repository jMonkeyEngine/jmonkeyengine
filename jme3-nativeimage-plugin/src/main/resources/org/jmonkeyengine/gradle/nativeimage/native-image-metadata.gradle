def asStringList = { Object value ->
    if (value == null) {
        return []
    }
    if (value instanceof CharSequence) {
        return [value.toString()]
    }
    if (value.getClass().isArray()) {
        return value.toList().findAll { it != null }.collect { it.toString() }
    }
    if (value instanceof Collection) {
        return value.findAll { it != null }.collect { it.toString() }
    }
    return [value.toString()]
}

def asStringMatrix = { Object value ->
    if (!(value instanceof Collection) && !(value != null && value.getClass().isArray())) {
        return []
    }
    def outer = value instanceof Collection ? value : value.toList()
    return outer.collect { entry ->
        asStringList(entry).findAll { !it.isEmpty() }
    }.findAll { !it.isEmpty() }
}

def extensionPropertyValue = { String propertyName ->
    if (nativeImageExtension == null || !nativeImageExtension.hasProperty(propertyName)) {
        return []
    }
    def property = nativeImageExtension[propertyName]
    return property?.getOrElse([])
}

def configuredStringList = { String extraPropertyName, String extensionPropertyName ->
    return asStringList(project.ext[extraPropertyName]) + asStringList(extensionPropertyValue(extensionPropertyName))
}

def configuredStringMatrix = { String extraPropertyName, String extensionPropertyName ->
    return asStringMatrix(project.ext[extraPropertyName]) + asStringMatrix(extensionPropertyValue(extensionPropertyName))
}

def loadClassSafely = { ClassLoader loader, String className ->
    try {
        return Class.forName(className, false, loader)
    } catch (Throwable ignored) {
        return null
    }
}

def isConstructible = { Class<?> clazz ->
    int modifiers = clazz.modifiers
    return !clazz.isInterface() && !clazz.isAnnotation() && !clazz.isAnonymousClass() && !clazz.isLocalClass() && !java.lang.reflect.Modifier.isAbstract(modifiers)
}

def safeAssignableFrom = { Class<?> target, Class<?> clazz ->
    try {
        return target.isAssignableFrom(clazz)
    } catch (Throwable ignored) {
        return false
    }
}

def safeAnnotationPresent = { Class<?> clazz, Class<?> annotationClass ->
    try {
        return clazz.isAnnotationPresent(annotationClass)
    } catch (Throwable ignored) {
        return false
    }
}

def safeSuperclass = { Class<?> clazz ->
    try {
        return clazz.superclass
    } catch (Throwable ignored) {
        return null
    }
}

def hasPublicNoArgCloneMethod = { Class<?> clazz ->
    try {
        clazz.getMethod('clone')
        return true
    } catch (Throwable ignored) {
        return false
    }
}

def binaryClassName = { File classesDir, File classFile ->
    String relativePath = classesDir.toPath().relativize(classFile.toPath()).toString().replace(File.separatorChar, (char) '/')
    if (!relativePath.endsWith('.class')) {
        return null
    }
    String className = relativePath.substring(0, relativePath.length() - '.class'.length()).replace('/', '.')
    if (className.endsWith('module-info') || className.endsWith('package-info')) {
        return null
    }
    return className
}

def normalizeClassReference = { String value ->
    if (value == null || value.isEmpty()) {
        return null
    }
    String raw = value
    while (raw.startsWith('[')) {
        raw = raw.substring(1)
    }
    if (raw.length() == 1 && 'BCDFIJSZV'.contains(raw)) {
        return null
    }
    if (raw.startsWith('L') && raw.endsWith(';')) {
        raw = raw.substring(1, raw.length() - 1)
    }
    int genericStart = raw.indexOf('<')
    if (genericStart >= 0) {
        raw = raw.substring(0, genericStart)
    }
    int signatureBound = raw.indexOf(':')
    if (signatureBound >= 0) {
        raw = raw.substring(0, signatureBound)
    }
    if (!raw.contains('/')) {
        return null
    }
    String className = raw.replace('/', '.')
    if (className.endsWith('module-info') || className.endsWith('package-info')) {
        return null
    }
    return className
}

def collectDescriptorClassReferences = { String descriptor ->
    SortedSet<String> references = new TreeSet<>()
    if (descriptor == null || descriptor.indexOf('L') < 0) {
        return references
    }
    int index = 0
    while (index < descriptor.length()) {
        int start = descriptor.indexOf('L', index)
        if (start < 0 || start + 1 >= descriptor.length()) {
            break
        }
        int end = start + 1
        while (end < descriptor.length()) {
            char ch = descriptor.charAt(end)
            if (ch == ';' || ch == '<' || ch == ':') {
                break
            }
            end++
        }
        if (end > start + 1) {
            String className = normalizeClassReference(descriptor.substring(start + 1, end))
            if (className != null) {
                references.add(className)
            }
        }
        index = end + 1
    }
    return references
}

def collectClassReferencesFromStream = { InputStream input ->
    SortedSet<String> references = new TreeSet<>()
    try {
        new DataInputStream(new BufferedInputStream(input)).withCloseable { stream ->
            if (stream.readInt() != -889275714) {
                return references
            }
            stream.readUnsignedShort()
            stream.readUnsignedShort()
            int constantPoolCount = stream.readUnsignedShort()
            String[] utf8Entries = new String[constantPoolCount]
            int[] classNameIndices = new int[constantPoolCount]
            for (int i = 1; i < constantPoolCount; i++) {
                int tag = stream.readUnsignedByte()
                switch (tag) {
                    case 1:
                        utf8Entries[i] = stream.readUTF()
                        break
                    case 3:
                    case 4:
                        stream.readInt()
                        break
                    case 5:
                    case 6:
                        stream.readLong()
                        i++
                        break
                    case 7:
                        classNameIndices[i] = stream.readUnsignedShort()
                        break
                    case 8:
                    case 16:
                    case 19:
                    case 20:
                        stream.readUnsignedShort()
                        break
                    case 9:
                    case 10:
                    case 11:
                    case 12:
                    case 17:
                    case 18:
                        stream.readUnsignedShort()
                        stream.readUnsignedShort()
                        break
                    case 15:
                        stream.readUnsignedByte()
                        stream.readUnsignedShort()
                        break
                    default:
                        return references
                }
            }

            classNameIndices.findAll { it > 0 }.each { int nameIndex ->
                String className = normalizeClassReference(utf8Entries[nameIndex])
                if (className != null) {
                    references.add(className)
                }
            }
            utf8Entries.findAll { it != null }.each { String entry ->
                references.addAll(collectDescriptorClassReferences(entry))
            }
        }
    } catch (Throwable ignored) {
    }
    return references
}

def collectClassReferences = { File classFile ->
    try {
        return classFile.withInputStream { input ->
            collectClassReferencesFromStream(input)
        }
    } catch (Throwable ignored) {
        return new TreeSet<String>()
    }
}

def isJdkClassName = { String className ->
    return className.startsWith('java.') ||
            className.startsWith('javax.') ||
            className.startsWith('jdk.') ||
            className.startsWith('sun.') ||
            className.startsWith('com.sun.') ||
            className.startsWith('org.w3c.') ||
            className.startsWith('org.xml.')
}

