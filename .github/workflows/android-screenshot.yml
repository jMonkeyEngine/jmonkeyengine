name: Android Screenshot Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        api-level: [29]

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}
      - name: Run Android Screenshot Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          avd-name: test_avd
          force-avd-creation: true
          emulator-options: -no-window -gpu mesa -noaudio -no-boot-anim -camera-back none -no-snapshot -no-snapshot-save -no-snapshot-load
          disable-animations: false
          script: |
            timeout 120 bash -c 'until adb shell getprop sys.boot_completed | grep -m 1 1; do sleep 5; done'
            adb uninstall org.jmonkeyengine.screenshottests.android || true
            ./gradlew :jme3-screenshot-tests:jme3-screenshot-tests-android:connectedDebugAndroidTest
            adb logcat -d > logcat.txt
            adb pull /storage/emulated/0/googletest/test_outputfiles/report ./protoReport
            adb pull /storage/emulated/0/googletest/test_outputfiles/changed-images . || true
      - name: Upload logcat
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-logcat
          path: logcat.txt
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-screenshot-report
          path: protoReport
          if-no-files-found: error