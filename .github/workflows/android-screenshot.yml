name: Android Screenshot Test

on:
  push:
    paths:
      - 'jme3-screenshot-tests/jme3-screenshot-tests-android/**'
      - '.github/workflows/android-screenshot.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        api-level: [29]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-window -gpu mesa -noaudio -no-boot-anim -camera-back none -port 5554 -no-snapshot -no-snapshot-save -no-snapshot-load
          disable-animations: false
          script: echo "AVD created, no snapshot saved."

      - name: Wait for emulator to boot
        run: |
          adb wait-for-device
          adb shell input keyevent 82 &
          adb shell input tap 300 300
          adb shell input tap 300 300
          adb shell input keyevent 4
          adb shell input keyevent 4
          adb shell input keyevent 4
          adb shell input keyevent 4
          adb shell input keyevent 4
          adb shell input keyevent 66
      - name: Run Android Screenshot Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            ./gradlew :jme3-screenshot-tests:jme3-screenshot-tests-android:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=org.jmonkeyengine.screenshottests.android.android.ScreenshotTest
            adb pull /sdcard/Android/data/org.jmonkeyengine.screenshottests.android/files/screenshot.png .

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshot
          path: screenshot.png
          if-no-files-found: error
      - name: Dump emulator logs
        if: always()
        run: |
          if adb devices | grep -q "emulator"; then
            timeout 10 adb logcat -d > emulator.log 2>&1 || echo "Logcat timed out"
          else
            echo "No emulator connected, skipping logcat"
          fi
      - name: Upload Emulator Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logs
          path: emulator.log