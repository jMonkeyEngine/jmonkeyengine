name: Android Screenshot Test

on:
  push:
    paths:
      - 'jme3-screenshot-tests/jme3-screenshot-tests-android/**'
      - '.github/workflows/android-screenshot.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        api-level: [29]

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}
      - name: Run Android Screenshot Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          avd-name: test_avd
          force-avd-creation: false  # Do NOT recreate the AVD
          emulator-options: -no-window -gpu mesa -noaudio -no-boot-anim -camera-back none -no-snapshot -no-snapshot-save -no-snapshot-load
          disable-animations: false
          script: |
            timeout 120 bash -c 'until adb shell getprop sys.boot_completed | grep -m 1 1; do sleep 5; done'
            # Install APKs manually (don't use connectedDebugAndroidTest as that auto unistalls at the end)
            ./gradlew :jme3-screenshot-tests:jme3-screenshot-tests-android:installDebug
            ./gradlew :jme3-screenshot-tests:jme3-screenshot-tests-android:installDebugAndroidTest
            # Run tests without auto-uninstall
            adb shell am instrument -w -r -e class org.jmonkeyengine.screenshottests.android.android.ScreenshotTest org.jmonkeyengine.screenshottests.android.test/androidx.test.runner.AndroidJUnitRunner
            adb logcat -d > logcat.txt
            adb pull /storage/emulated/0/Android/data/org.jmonkeyengine.screenshottests.android/files/screenshot.png .
      - name: Upload logcat
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-logcat
          path: logcat.txt
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-screenshot
          path: screenshot.png
          if-no-files-found: error