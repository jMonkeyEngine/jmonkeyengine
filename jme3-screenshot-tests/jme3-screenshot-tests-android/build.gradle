plugins {
    id "io.github.0ffz.github-packages" version "1.2.1" // Plugin for anonymous inclusion of artifacts hosted in github package registry
}

apply plugin: 'com.android.application'

android {
    namespace "org.jmonkeyengine.screenshottests.android"
    compileSdk 36

    defaultConfig {
        applicationId "org.jmonkeyengine.screenshottests.android"
        minSdk 28
        targetSdk 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    configurations.all {
        exclude group:"org.jmonkeyengine",module:"jme3-desktop"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation libs.androidxAppcompat
    implementation libs.googleMaterial
    implementation libs.androidxConstraintlayout

    //implementation project(":jme3-android")
    //implementation project(":jme3-android-native")
    implementation("org.jmonkeyengine:jme3-android:3.9.0-stable");
    implementation("org.jmonkeyengine:jme3-android-native:3.9.0-stable"); // todo, should be local

    androidTestImplementation libs.androidx.test.core
    androidTestImplementation libs.androidx.test.ext.junit
    androidTestImplementation libs.androidx.test.rules
    androidTestImplementation libs.androidx.test.espresso.core
}
