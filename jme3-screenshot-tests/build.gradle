plugins {
    id 'java'
}

import org.gradle.internal.os.OperatingSystem

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':jme3-desktop')
    implementation project(':jme3-core')
    implementation project(':jme3-effects')
    implementation project(':jme3-terrain')
    implementation project(':jme3-lwjgl3')
    implementation project(':jme3-plugins')

    implementation 'com.aventstack:extentreports:5.1.1'
    implementation platform('org.junit:junit-bom:5.9.1')
    implementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly project(':jme3-testdata')
}

tasks.register("screenshotTest", Test) {
    useJUnitPlatform{
        filter{
            includeTags 'integration'
        }
    }
    // On macOS, GLFW (used by LWJGL3) requires all window operations on the main OS thread.
    // -XstartOnFirstThread makes the JVM main thread the macOS main thread so tests can
    // start the JME application directly without going through an executor thread.
    if (OperatingSystem.current().isMacOsX()) {
        jvmArgs '-XstartOnFirstThread'
    }
    // On Windows CI, Mesa3D software rendering is needed for OpenGL support.
    // Set MESA3D_LIBS_PATH to the directory containing Mesa's opengl32.dll and its
    // dependencies before running the tests. LWJGL3 will extract its own natives to the
    // same directory, and Windows' DLL search order will then prefer Mesa's opengl32.dll
    // over the system one.
    def mesaLibsPath = System.getenv("MESA3D_LIBS_PATH")
    if (mesaLibsPath) {
        systemProperty 'org.lwjgl.librarypath', mesaLibsPath
    }
}


test {
    useJUnitPlatform{
        filter{
            excludeTags 'integration'
        }
    }
}