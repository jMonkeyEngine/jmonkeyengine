name: "Unshaded"

parameters:

  - name: "Parameters"
    type: UniformBuffer
    struct: com.jme3.vulkan.material.structs.UnshadedParams

  - name: "Lighting"
    type: UniformBuffer
    struct: Lighting

  - name: "ColorMap"
    type: Texture
    default: "Common/Textures/MissingTexture.jpg"

  # example of a parameter that only controls a macro
  - name: "NormalUnpacker"
    type: String
    default: "normal.xyz"

# represents the additional render state
renderState:
  cullMode: Front

techniques:
  - name: "main"
    shaders:
      vertex:
        file: "Shaders/VulkanVertTest.glsl"
        entry: "main" # entry is "main" by default
        version: 450 # version is 450 by default
      fragment: "Shaders/VulkanFragTest.yml"
    bindings:
      - name: "ColorMap"
        location: [0, 0] # [set, binding]
        scope: [Fragment] # default scope is all
        define: "COLOR_MAP"
      - name: "NormalUnpacker"
        scope: [Fragment]
        define: "NORMAL_UNPACKER"
        # location not defined: is not a writable uniform in this case
    pushConstants:
      - scope: [Vertex] # default scope is all
        uniform: "Transforms"
    renderState:
      cullMode: None
      stencil:
        frontStencilFail: Keep
    attributes:
      Position: 0
      TexCoord: 1
      Normal: 2

